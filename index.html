<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticketing</title>

<style>
body{font-family:sans-serif;background:#0a0a0f;color:white;display:flex;justify-content:center}
.wrap{max-width:500px;width:100%;padding:20px}
.card{background:#13131a;padding:16px;border-radius:12px;margin-bottom:10px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;background:#e8ff6b;font-weight:bold;cursor:pointer}
.event{padding:12px;border:1px solid #333;border-radius:10px;margin-bottom:10px;cursor:pointer}
.sub{display:none}
.sub.active{display:block}
.timer{text-align:center;font-size:28px;margin:10px 0}
</style>
</head>

<body>
<div class="wrap">

<h2>Pilih Event</h2>
<div id="list"></div>

<div id="detail" style="display:none">

<button onclick="back()">← Kembali</button>

<div class="card">
<div id="name"></div>
<div id="date"></div>
<div id="price"></div>
</div>

<button class="btn" onclick="show('form')">Pesan</button>

<!-- FORM -->
<div id="form" class="sub">
<input id="name1" placeholder="Nama">
<input id="email" placeholder="Email">
<button class="btn" onclick="order()">Lanjut</button>
</div>

<!-- PAYMENT -->
<div id="pay" class="sub">
<div class="card">
<div id="orderId"></div>
<div class="timer" id="timer">03:00</div>
<div id="va"></div>
<button class="btn" onclick="confirmPay()">Saya Sudah Transfer</button>
</div>
</div>

<!-- SUCCESS -->
<div id="done" class="sub">
<div class="card">
<h3>Berhasil</h3>
<div id="doneId"></div>
</div>
</div>

</div>

</div>

<script>

// ================= CONFIG =================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylpVq5gSu2wwZb62ibiRnMV7C-4gYiLbgSQFsUyJ2R_iG2PecN4yD-Eq6MCfddUIZ_/exec";

// ================= API =================
async function api(action,data={}){
  const res = await fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify({action,...data})
  });
  return res.json();
}

// ================= STATE =================
let currentEvent=null;
let orderId=null;
let timerInt=null;

// ================= LOAD EVENTS =================
async function load(){
  const res = await api("listEvents");

  const el = document.getElementById("list");
  el.innerHTML="";

  res.events.forEach(e=>{
    const div=document.createElement("div");
    div.className="event";

    div.innerHTML=`
      <b>${e.eventName}</b><br>
      ${e.eventDate}<br>
      Rp ${e.ticketPrice.toLocaleString()}
    `;

    div.onclick=()=>openEvent(e);
    el.appendChild(div);
  });
}
load();

// ================= NAV =================
function openEvent(e){
  currentEvent=e;
  list.style.display="none";
  detail.style.display="block";

  name.innerText=e.eventName;
  date.innerText=e.eventDate;
  price.innerText="Rp "+e.ticketPrice.toLocaleString();
}

function back(){
  detail.style.display="none";
  list.style.display="block";
}

// ================= ORDER =================
async function order(){
  const name1=document.getElementById("name1").value.trim();
  const email=document.getElementById("email").value.trim();

  if(!name1) return alert("Nama wajib");
  if(!email.includes("@")) return alert("Email tidak valid");

  const res = await api("createOrder",{
    eventKey:currentEvent.key,
    slots:1,
    name1,
    email
  });

  if(!res.success) return alert(res.error);

  orderId=res.orderId;

  document.getElementById("orderId").innerText=orderId;
  document.getElementById("va").innerText=res.virtualAccount;

  show("pay");
  startTimer();
}

// ================= PAYMENT =================
async function confirmPay(){
  const res = await api("confirmPayment",{
    eventKey:currentEvent.key,
    orderId
  });

  if(!res.success) return alert(res.error);

  clearInterval(timerInt);
  document.getElementById("doneId").innerText=orderId;
  show("done");
}

// ================= TIMER =================
function startTimer(){
  clearInterval(timerInt);
  let t=180;

  timerInt=setInterval(()=>{
    t--;
    let m=String(Math.floor(t/60)).padStart(2,"0");
    let s=String(t%60).padStart(2,"0");
    timer.innerText=m+":"+s;

    if(t<=0){
      clearInterval(timerInt);
      alert("Expired");
      back();
    }
  },1000);
}

// ================= UI =================
function show(id){
  document.querySelectorAll(".sub").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
