<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticketing</title>

<style>
:root{
  --bg:#fff;
  --card:#fff;
  --border:#f2e6ea;
  --pink:#ff4fa3;
  --pink-soft:#ffe4ef;
  --text:#2b2b2b;
  --text2:#888;
}

body{
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
}

.wrap{
  max-width:500px;
  width:100%;
  padding:20px;
}

h2{
  font-size:22px;
  margin-bottom:15px;
}

/* CARD */
.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-bottom:12px;
  border:1px solid var(--border);
}

/* EVENT */
.event{
  padding:14px;
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
  transition:.2s;
}
.event:hover{
  border-color:var(--pink);
  background:var(--pink-soft);
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--pink);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}
.btn:hover{
  background:#ff2d92;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--border);
  outline:none;
}
input:focus{
  border-color:var(--pink);
}

/* TIMER */
.timer{
  text-align:center;
  font-size:28px;
  margin:12px 0;
  color:var(--pink);
  font-weight:bold;
}

/* TEXT */
.small{
  color:var(--text2);
  font-size:13px;
}

/* STATE */
.hidden{display:none}
</style>
</head>

<body>
<div class="wrap">

<h2>✨ Pilih Event</h2>

<div id="list"></div>

<div id="detail" class="hidden">

<button onclick="back()">← Kembali</button>

<div class="card">
<div id="name"></div>
<div id="date" class="small"></div>
<div id="price"></div>
</div>

<button class="btn" onclick="showForm()">Pesan Tiket</button>

<!-- FORM -->
<div id="form" class="hidden">
<input id="name1" placeholder="Nama lengkap">
<input id="email" placeholder="Email aktif">
<button class="btn" onclick="order()">Lanjut</button>
</div>

<!-- PAYMENT -->
<div id="pay" class="hidden">
<div class="card">
<div id="orderId"></div>
<div class="timer" id="timer">03:00</div>
<div id="va"></div>
<button class="btn" onclick="confirmPay()">Saya Sudah Transfer</button>
</div>
</div>

<!-- SUCCESS -->
<div id="done" class="hidden">
<div class="card">
<h3 style="color:var(--pink)">Pembayaran Berhasil 💖</h3>
<div id="doneId"></div>
</div>
</div>

</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylpVq5gSu2wwZb62ibiRnMV7C-4gYiLbgSQFsUyJ2R_iG2PecN4yD-Eq6MCfddUIZ_/exec";

async function api(action,data={}){
  const res = await fetch(SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action,...data})
  });
  return res.json();
}

let currentEvent=null;
let orderId=null;
let timerInt=null;

async function load(){
  const res = await api("listEvents");
  const el = document.getElementById("list");
  el.innerHTML="";

  res.events.forEach(e=>{
    const div=document.createElement("div");
    div.className="event";

    div.innerHTML=`
      <b>${e.eventName}</b><br>
      <span class="small">${e.eventDate}</span><br>
      <b>Rp ${e.ticketPrice.toLocaleString()}</b>
    `;

    div.onclick=()=>openEvent(e);
    el.appendChild(div);
  });
}
load();

function openEvent(e){
  currentEvent=e;
  list.classList.add("hidden");
  detail.classList.remove("hidden");

  name.innerText=e.eventName;
  date.innerText=e.eventDate;
  price.innerText="Rp "+e.ticketPrice.toLocaleString();
}

function back(){
  detail.classList.add("hidden");
  list.classList.remove("hidden");
}

function showForm(){
  form.classList.remove("hidden");
}

async function order(){
  const name1=name1Input.value.trim();
  const email=emailInput.value.trim();

  if(!name1) return alert("Nama wajib");
  if(!email.includes("@")) return alert("Email tidak valid");

  const res = await api("createOrder",{
    eventKey:currentEvent.key,
    slots:1,
    name1,
    email
  });

  if(!res.success) return alert(res.error);

  orderId=res.orderId;

  orderIdEl.innerText=orderId;
  va.innerText=res.virtualAccount;

  pay.classList.remove("hidden");
  startTimer();
}

async function confirmPay(){
  const res = await api("confirmPayment",{
    eventKey:currentEvent.key,
    orderId
  });

  if(!res.success) return alert(res.error);

  clearInterval(timerInt);
  doneId.innerText=orderId;
  done.classList.remove("hidden");
}

function startTimer(){
  clearInterval(timerInt);
  let t=180;

  timerInt=setInterval(()=>{
    t--;
    let m=String(Math.floor(t/60)).padStart(2,"0");
    let s=String(t%60).padStart(2,"0");
    timer.innerText=m+":"+s;

    if(t<=0){
      clearInterval(timerInt);
      alert("Expired");
      back();
    }
  },1000);
}

</script>

</body>
</html>
